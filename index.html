<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS - AI Assistant</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* SVG Animations - INLINE */
        @keyframes rotate-cw {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        @keyframes rotate-ccw {
            from { transform: rotate(360deg); }
            to { transform: rotate(0deg); }
        }
        
        @keyframes pulse-glow {
            0%, 100% {
                r: 45;
                filter: drop-shadow(0 0 20px #00d4ff);
            }
            50% {
                r: 55;
                filter: drop-shadow(0 0 40px #00d4ff);
            }
        }
        
        @keyframes orbit {
            0% {
                transform: translate(0, -150px) rotate(0deg);
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
            100% {
                transform: translate(0, -150px) rotate(360deg);
                opacity: 1;
            }
        }
        
        .ring1 {
            animation: rotate-cw 20s linear infinite;
            transform-origin: 200px 200px;
        }
        
        .ring2 {
            animation: rotate-ccw 15s linear infinite;
            transform-origin: 200px 200px;
        }
        
        .ring3 {
            animation: rotate-cw 10s linear infinite;
            transform-origin: 200px 200px;
        }
        
        .center-orb {
            animation: pulse-glow 2s ease-in-out infinite;
        }
        
        .particle {
            animation: orbit 10s linear infinite;
            transform-origin: 200px 200px;
        }
    </style>
</head>
<body>
    <div class="main-container">
        <!-- Left Panel - Visualization -->
        <div class="left-panel">
            <div class="visualization">
                <svg class="jarvis-animation" viewBox="0 0 400 400" width="300" height="300">
                    <defs>
                        <filter id="glow1">
                            <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
                            <feMerge>
                                <feMergeNode in="coloredBlur"/>
                                <feMergeNode in="SourceGraphic"/>
                            </feMerge>
                        </filter>
                        <filter id="glow2">
                            <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
                            <feMerge>
                                <feMergeNode in="coloredBlur"/>
                                <feMergeNode in="SourceGraphic"/>
                            </feMerge>
                        </filter>
                    </defs>
                    
                    <!-- Rotating rings with colors -->
                    <circle cx="200" cy="200" r="180" class="ring1" fill="none" stroke="#00d4ff" stroke-width="2" filter="url(#glow1)" opacity="0.6"></circle>
                    <circle cx="200" cy="200" r="130" class="ring2" fill="none" stroke="#ff00ff" stroke-width="2" filter="url(#glow1)" opacity="0.5"></circle>
                    <circle cx="200" cy="200" r="80" class="ring3" fill="none" stroke="#0099cc" stroke-width="2" filter="url(#glow1)" opacity="0.4"></circle>
                    
                    <!-- Center pulsing orb -->
                    <circle cx="200" cy="200" r="45" class="center-orb" fill="#00d4ff" filter="url(#glow2)"></circle>
                    
                    <!-- Orbiting particles -->
                    <g class="particle" style="animation-delay: 0s;">
                        <circle cx="200" cy="50" r="5" fill="#00d4ff" filter="url(#glow2)"></circle>
                    </g>
                    <g class="particle" style="animation-delay: 2.5s;">
                        <circle cx="200" cy="50" r="5" fill="#00d4ff" filter="url(#glow2)"></circle>
                    </g>
                    <g class="particle" style="animation-delay: 5s;">
                        <circle cx="200" cy="50" r="5" fill="#ff00ff" filter="url(#glow2)"></circle>
                    </g>
                    <g class="particle" style="animation-delay: 7.5s;">
                        <circle cx="200" cy="50" r="5" fill="#ff00ff" filter="url(#glow2)"></circle>
                    </g>
                </svg>
                
                <div class="title-overlay">
                    <h1>J A R V I S</h1>
                    <p>Systems Nominal</p>
                </div>
            </div>
        </div>

        <!-- Right Panel - Control -->
        <div class="right-panel">
            <div class="header">
                <h2>JARVIS</h2>
                <p>Advanced AI Assistant</p>
                <div class="status-bar">
                    <span class="status-light"></span>
                    <span>Ready</span>
                </div>
            </div>

            <!-- Chat Area -->
            <div class="chat-area">
                <div class="messages" id="messages">
                    <div class="message bot">
                        <div class="message-bubble">Hello! I'm JARVIS. How can I assist you today?</div>
                    </div>
                </div>
            </div>

            <!-- Input Area -->
            <div class="input-area">
                <input type="text" id="userInput" placeholder="Ask me anything..." class="input-field">
                <button id="sendBtn" class="send-btn">Send</button>
                <button id="voiceBtn" class="voice-btn">🎤</button>
            </div>

            <!-- Quick Actions -->
            <div class="quick-actions">
                <button class="quick-btn" data-action="weather">🌤️ Weather</button>
                <button class="quick-btn" data-action="time">⏰ Time</button>
                <button class="quick-btn" data-action="joke">😄 Joke</button>
                <button class="quick-btn" data-action="quote">💡 Quote</button>
            </div>

            <!-- Settings Section -->
            <div class="settings-section">
                <button id="settingsToggle" class="settings-toggle">⚙️ Settings</button>
                <div class="settings-panel" id="settingsPanel" style="display: none;">
                    <div class="setting-item">
                        <label>API Key (API Ninjas)</label>
                        <input type="password" id="apiKey" placeholder="Enter your API key here" class="api-input">
                        <small>Get free key at api-ninjas.com</small>
                    </div>
                    <div class="setting-item">
                        <label>Volume</label>
                        <input type="range" id="volume" min="0" max="100" value="70" class="slider">
                    </div>
                    <div class="setting-item">
                        <label>
                            <input type="checkbox" id="autoSpeak" checked>
                            Auto Voice Response
                        </label>
                    </div>
                    <div class="setting-item">
                        <label>Theme</label>
                        <select id="theme" class="theme-select">
                            <option value="dark">Dark</option>
                            <option value="neon">Neon</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
