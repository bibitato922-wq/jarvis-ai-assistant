<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS - AI Assistant</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Main Visualization with Flowing Lights -->
        <div class="visualization">
            <div class="jarvis-title">J A R V I S</div>
            
            <div class="glow-circle-container">
                <!-- Flowing rings -->
                <div class="flowing-ring ring-1"></div>
                <div class="flowing-ring ring-2"></div>
                <div class="flowing-ring ring-3"></div>
                
                <!-- Pulse rings -->
                <div class="pulse-ring pulse-ring-1"></div>
                <div class="pulse-ring pulse-ring-2"></div>
                
                <!-- Center glowing orb -->
                <div class="center-orb"></div>
                
                <!-- Orbiting particles -->
                <div class="particles">
                    <div class="particle type-1"></div>
                    <div class="particle type-1"></div>
                    <div class="particle type-2"></div>
                    <div class="particle type-2"></div>
                </div>
            </div>
            
            <!-- Status indicator -->
            <div class="status-indicator">
                <span class="status-dot"></span>
                <span class="status-text">SYSTEMS NOMINAL - STANDING BY, SIR.</span>
            </div>
        </div>

        <!-- Control Panel -->
        <div class="control-panel">
            <h1>JARVIS</h1>
            <p class="subtitle">Advanced AI Assistant</p>

            <!-- Chat Display -->
            <div class="chat-container">
                <div class="chat-messages" id="chatMessages">
                    <div class="message assistant">
                        <div class="message-content">
                            Hello! I'm JARVIS, your AI assistant. How can I help you today?
                        </div>
                    </div>
                </div>
            </div>

            <!-- Input Controls -->
            <div class="input-section">
                <input 
                    type="text" 
                    id="userInput" 
                    class="chat-input" 
                    placeholder="Type your message or click the mic..."
                    autocomplete="off"
                >
                <button id="sendBtn" class="btn btn-send" title="Send message">
                    →
                </button>
                <button id="voiceBtn" class="btn btn-voice" title="Start voice input">
                    🎤
                </button>
            </div>

            <!-- Voice Status -->
            <div class="voice-status" id="voiceStatus" style="display: none;">
                <div class="listening-indicator">
                    <span class="dot"></span>
                    <span class="dot"></span>
                    <span class="dot"></span>
                </div>
                <p>Listening...</p>
            </div>

            <!-- Quick Actions -->
            <div class="quick-actions">
                <button class="quick-btn" data-action="weather">🌤️ Weather</button>
                <button class="quick-btn" data-action="time">⏰ Time</button>
                <button class="quick-btn" data-action="joke">😄 Joke</button>
                <button class="quick-btn" data-action="quote">💡 Quote</button>
            </div>
        </div>

        <!-- Settings Panel -->
        <div class="settings-panel">
            <button id="settingsBtn" class="settings-btn">⚙️</button>
            <div class="settings-menu" id="settingsMenu" style="display: none;">
                <div class="setting">
                    <label>Volume</label>
                    <input type="range" id="volumeControl" min="0" max="100" value="70">
                </div>
                <div class="setting">
                    <label>Theme</label>
                    <select id="themeSelect">
                        <option value="dark">Dark</option>
                        <option value="light">Light</option>
                        <option value="neon">Neon</option>
                    </select>
                </div>
                <div class="setting">
                    <label>
                        <input type="checkbox" id="autoSpeak" checked>
                        Auto Voice Response
                    </label>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
