<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS - AI Assistant</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <!-- Left Panel - Visualization -->
        <div class="left-panel">
            <div class="visualization">
                <svg class="jarvis-animation" viewBox="0 0 400 400">
                    <!-- Background circles -->
                    <circle cx="200" cy="200" r="180" class="orbit-ring" style="animation-duration: 20s;"></circle>
                    <circle cx="200" cy="200" r="130" class="orbit-ring" style="animation-duration: 15s; animation-direction: reverse;"></circle>
                    <circle cx="200" cy="200" r="80" class="orbit-ring" style="animation-duration: 10s;"></circle>
                    
                    <!-- Pulsing center orb -->
                    <circle cx="200" cy="200" r="50" class="center-orb"></circle>
                    
                    <!-- Orbiting particles -->
                    <circle cx="200" cy="200" r="4" class="particle" style="animation-delay: 0s;"></circle>
                    <circle cx="200" cy="200" r="4" class="particle" style="animation-delay: 2.5s;"></circle>
                    <circle cx="200" cy="200" r="4" class="particle" style="animation-delay: 5s;"></circle>
                    <circle cx="200" cy="200" r="4" class="particle" style="animation-delay: 7.5s;"></circle>
                </svg>
                
                <div class="title-overlay">
                    <h1>J A R V I S</h1>
                    <p>Systems Nominal</p>
                </div>
            </div>
        </div>

        <!-- Right Panel - Control -->
        <div class="right-panel">
            <div class="header">
                <h2>JARVIS</h2>
                <p>Advanced AI Assistant</p>
                <div class="status-bar">
                    <span class="status-light"></span>
                    <span>Ready</span>
                </div>
            </div>

            <!-- Chat Area -->
            <div class="chat-area">
                <div class="messages" id="messages">
                    <div class="message bot">
                        <div class="message-bubble">Hello! I'm JARVIS. How can I assist you today?</div>
                    </div>
                </div>
            </div>

            <!-- Input Area -->
            <div class="input-area">
                <input type="text" id="userInput" placeholder="Ask me anything..." class="input-field">
                <button id="sendBtn" class="send-btn">Send</button>
                <button id="voiceBtn" class="voice-btn">🎤</button>
            </div>

            <!-- Quick Actions -->
            <div class="quick-actions">
                <button class="quick-btn" data-action="weather">🌤️ Weather</button>
                <button class="quick-btn" data-action="time">⏰ Time</button>
                <button class="quick-btn" data-action="joke">😄 Joke</button>
                <button class="quick-btn" data-action="quote">💡 Quote</button>
            </div>

            <!-- Settings Section -->
            <div class="settings-section">
                <button id="settingsToggle" class="settings-toggle">⚙️ Settings</button>
                <div class="settings-panel" id="settingsPanel" style="display: none;">
                    <div class="setting-item">
                        <label>API Key (API Ninjas)</label>
                        <input type="password" id="apiKey" placeholder="Enter your API key here" class="api-input">
                        <small>Get free key at api-ninjas.com</small>
                    </div>
                    <div class="setting-item">
                        <label>Volume</label>
                        <input type="range" id="volume" min="0" max="100" value="70" class="slider">
                    </div>
                    <div class="setting-item">
                        <label>
                            <input type="checkbox" id="autoSpeak" checked>
                            Auto Voice Response
                        </label>
                    </div>
                    <div class="setting-item">
                        <label>Theme</label>
                        <select id="theme" class="theme-select">
                            <option value="dark">Dark</option>
                            <option value="neon">Neon</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
